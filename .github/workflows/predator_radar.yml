name: Sovereign Predator Radar

on:
  schedule:
    - cron: '0 * * * *' # 物理排程：每小時的 0 分自動觸發一次
  workflow_dispatch: # 手動覆寫：允許你在網頁上點擊按鈕隨時強制觸發

jobs:
  scan-and-fire:
    runs-on: ubuntu-latest # 寄生在微軟提供的最新 Linux 伺服器上
    steps:
      - name: 1. 裝載系統代碼 (Checkout Code)
        uses: actions/checkout@v4

      - name: 2. 安裝以太坊底層工具 (Install Foundry/cast)
        uses: foundry-rs/foundry-toolchain@v1

      - name: 3. 喚醒 Rust 掠奪大腦 (Setup Rust)
        uses: dtolnay/rust-toolchain@stable

      - name: 4. 啟動實時雷達掃描 (Fire Radar)
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }} # 從保險箱提取密鑰
        run: |
          cd script
          cargo run --release