name: Sovereign Predator Radar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan-and-fire:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 裝載系統代碼 (Checkout Code)
        uses: actions/checkout@v4

      - name: 1.5 安裝 ZK 協議零件 (Install Protoc)
        run: sudo apt-get install -y protobuf-compiler

      - name: 2. 安裝以太坊底層工具 (Install Foundry/cast)
        uses: foundry-rs/foundry-toolchain@v1

      - name: 3. 喚醒 Rust 掠奪大腦 (Setup Rust)
        uses: dtolnay/rust-toolchain@stable

      - name: 4. 啟動實時雷達掃描 (Fire Radar)
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          cd script
          cargo run --release